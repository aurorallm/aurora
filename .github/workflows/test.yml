name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.2"

# Restrict token permissions to minimum required
permissions:
  contents: read

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Build dashboard UI
        run: cd dashboard-ui && pnpm install --no-frozen-lockfile && pnpm build

      - name: Run unit tests
        run: make test-race

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  test-dashboard:
    name: Dashboard Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run dashboard JavaScript tests
        run: make test-dashboard

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-dashboard]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Build dashboard UI
        run: cd dashboard-ui && pnpm install --no-frozen-lockfile && pnpm build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build -v ./apps/aurora
