name = "aurora-heartbeat"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"

# ============================================================
# Hyperdrive — Cloudflare's Postgres connection pooler
# Setup: cloudflare dashboard → Hyperdrive → Create
# Paste your Aiven Postgres connection string there.
# Then copy the Hyperdrive ID into the binding below.
# ============================================================
[[hyperdrive]]
binding = "HEARTBEAT_DB"
id = "e07c014b49324ba78f194171ff4444e4"

# Rate limit: optional, prevents abuse
[limits]
requests_per_minute = 1000

# Daily aggregate cron trigger at 03:00 UTC
[triggers]
crons = ["0 3 * * *"]
