# Default values for aurora
# This is a YAML-formatted file.

# -- Number of replicas (ignored if autoscaling.enabled is true)
replicaCount: 2

image:
  # -- Image repository
  repository: aurorahq/aurora
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default is the chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []
# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the chart
fullnameOverride: ""

# Runtime configuration
# Aurora uses a 3-layer config chain: code defaults → config.yaml → env vars (env vars win)
# The Docker image ships with configs/config.yaml using ${VAR:-default} syntax throughout,
# so almost every setting can be overridden via environment variables without rebuilding.
#
# For full config control, provide your own config.yaml content below. It will be mounted
# as a ConfigMap over the image default. Any setting not specified falls back to the
# image default, and env vars from the deployment override both.
config:
  # -- Custom config.yaml content (YAML string) mounted over the image default.
  # Use this to customize any runtime setting without rebuilding the image.
  # Env vars from the deployment (providers, storage paths, etc.) still override.
  content: ""
  # -- Use an existing ConfigMap containing a config.yaml key
  existingConfigMap: ""

# Server configuration
server:
  # -- Server port
  port: 8080
  # -- URL path prefix where Aurora is mounted (for example, "/g")
  basePath: "/"
  # -- Maximum request body size (e.g., "10M", "1G", "500K")
  bodySizeLimit: "10M"

# Authentication configuration
auth:
  # -- Master key for API authentication (leave empty to disable auth - NOT recommended for production)
  masterKey: ""
  # -- Use an existing secret for the master key
  existingSecret: ""
  # -- Key in the existing secret containing the master key
  existingSecretKey: "master-key"

# LLM Provider configuration
providers:
  # -- Use an existing secret for all provider API keys
  # Secret should contain keys: OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, GROQ_API_KEY, XAI_API_KEY, ZAI_API_KEY, ORACLE_API_KEY, VLLM_API_KEY
  existingSecret: ""

  openai:
    # -- Enable OpenAI provider (auto-enabled if apiKey is set)
    enabled: false
    # -- OpenAI API key (ignored if providers.existingSecret is set)
    apiKey: ""
    # -- Optional: Override OpenAI base URL
    baseUrl: ""

  anthropic:
    # -- Enable Anthropic provider (auto-enabled if apiKey is set)
    enabled: false
    # -- Anthropic API key (ignored if providers.existingSecret is set)
    apiKey: ""
    # -- Optional: Override Anthropic base URL
    baseUrl: ""

  gemini:
    # -- Enable Google Gemini provider (auto-enabled if apiKey is set)
    enabled: false
    # -- Gemini API key (ignored if providers.existingSecret is set)
    apiKey: ""
    # -- Optional: Override Gemini base URL
    baseUrl: ""

  groq:
    # -- Enable Groq provider (auto-enabled if apiKey is set)
    enabled: false
    # -- Groq API key (ignored if providers.existingSecret is set)
    apiKey: ""
    # -- Optional: Override Groq base URL
    baseUrl: ""

  xai:
    # -- Enable xAI (Grok) provider (auto-enabled if apiKey is set)
    enabled: false
    # -- xAI API key (ignored if providers.existingSecret is set)
    apiKey: ""
    # -- Optional: Override xAI base URL
    baseUrl: ""

  zai:
    # -- Enable Z.ai provider (auto-enabled if apiKey is set)
    enabled: false
    # -- Z.ai API key (ignored if providers.existingSecret is set)
    apiKey: ""
    # -- Optional: Override Z.ai base URL; use https://api.z.ai/api/coding/paas/v4 for GLM Coding Plan
    baseUrl: ""

  oracle:
    # -- Enable Oracle provider (auto-enabled if apiKey is set)
    enabled: false
    # -- Oracle API key (ignored if providers.existingSecret is set)
    apiKey: ""
    # -- Required: Oracle OpenAI-compatible base URL
    baseUrl: ""

  vllm:
    # -- Enable vLLM provider (API key optional; baseUrl required when enabled)
    enabled: false
    # -- Optional vLLM API key, matching vllm serve --api-key when configured
    apiKey: ""
    # -- vLLM OpenAI-compatible base URL
    baseUrl: ""

# Cache configuration
cache:
  redis:
    # -- Redis connection URL (e.g., "redis://redis:6379")
    # If redis.enabled is true, this is auto-configured to use the subchart.
    # Set this explicitly to use an external Redis instance instead.
    url: ""
    # -- Redis key prefix for storing the model cache
    keyModels: "aurora:models"
    # -- TTL for model cache data in seconds (default: 24 hours)
    ttlModels: 86400
    # -- Redis key prefix for storing the response cache
    keyResponses: "aurora:response:"
    # -- TTL for response cache data in seconds (default: 1 hour)
    ttlResponses: 3600

# Redis subchart configuration (Bitnami Redis)
redis:
  # -- Deploy Redis subchart
  enabled: true
  # -- Redis architecture: standalone or replication
  architecture: standalone
  auth:
    # -- Disable Redis authentication for simplicity
    enabled: false
  master:
    persistence:
      # -- Disable persistence for standalone mode
      enabled: false

# Prometheus metrics configuration
metrics:
  # -- Enable Prometheus metrics
  enabled: true
  # -- Metrics endpoint path
  endpoint: "/metrics"

  serviceMonitor:
    # -- Create a ServiceMonitor for Prometheus Operator
    enabled: false
    # ServiceMonitor path is automatically prefixed with server.basePath.
    # -- Scrape interval
    interval: "15s"
    # -- Additional labels for the ServiceMonitor
    labels: {}

# Logging configuration
logging:
  # -- Log format; leave empty to auto-detect, or set to "json" or "text"
  format: ""

# Kubernetes Service configuration
service:
  # -- Service type: ClusterIP, LoadBalancer, NodePort
  type: ClusterIP
  # -- Service port
  port: 8080
  # -- Service annotations
  annotations: {}

# Ingress configuration
ingress:
  # -- Enable Ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts configuration
  hosts:
    - host: aurora.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
  #  - secretName: aurora-tls
  #    hosts:
  #      - aurora.local

# Gateway API configuration
gateway:
  # -- Enable Gateway API HTTPRoute
  enabled: false
  # -- Parent Gateway reference
  parentRef:
    # -- Gateway name
    name: ""
    # -- Gateway namespace (defaults to release namespace)
    namespace: ""
  # -- Hostnames for the HTTPRoute
  hostnames: []
  #  - aurora.example.com

# Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Horizontal Pod Autoscaler configuration
autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum replicas
  minReplicas: 2
  # -- Maximum replicas
  maxReplicas: 10
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 70
  # -- Target memory utilization percentage (optional)
  # targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget configuration
podDisruptionBudget:
  # -- Enable PDB
  enabled: true
  # -- Minimum available pods
  minAvailable: 1
  # -- Maximum unavailable pods (alternative to minAvailable)
  # maxUnavailable: 1

# Liveness probe configuration
# httpGet.path is automatically prefixed with server.basePath.
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
# httpGet.path is automatically prefixed with server.basePath.
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Additional pod annotations
podAnnotations: {}

# -- Additional pod labels
podLabels: {}
